<style>
  /* ============================================================
     0. RESET & BASE
  ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root{
    --white:        #ffffff;
    --surface:      #f6f6f4;
    --surface-2:    #f0f0ee;
    --ink:          #111111;
    --ink-soft:     #4a4a4d;
    --ink-faint:    #83838a;
    --border:       #e4e4e0;
    --border-strong:#d3d3cd;
    --black:        #000000;
    --black-surface:#141414;
    --black-border: #2a2a2a;

    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", "Segoe UI Mono", Menlo, Consolas, monospace;

    --container: 1200px;
    --pad-inline: clamp(20px, 6vw, 64px);
    --section-pad: clamp(88px, 11vw, 160px);

    --radius-lg: 24px;
    --radius-md: 16px;
    --radius-full: 999px;

    --ease: cubic-bezier(.22,.61,.36,1);
    --nav-h: 76px;
  }

  html{
    scroll-behavior: smooth;
    scroll-padding-top: var(--nav-h);
  }

  body{
    font-family: var(--font-sans);
    color: var(--ink);
    background: var(--white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
    font-size: 17px;
  }

  img, svg { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  ul { list-style: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

  a:focus-visible,
  button:focus-visible,
  [tabindex]:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 3px;
    border-radius: 4px;
  }

  .container{
    width: 100%;
    max-width: var(--container);
    margin-inline: auto;
    padding-inline: var(--pad-inline);
  }

  .skip-link{
    position: absolute;
    left: -9999px;
    top: 0;
    background: var(--ink);
    color: var(--white);
    padding: 12px 20px;
    border-radius: 0 0 10px 0;
    z-index: 1000;
  }
  .skip-link:focus{ left: 0; }

  section{ padding-block: var(--section-pad); }

  .section-header{
    max-width: 640px;
    margin-bottom: clamp(48px, 6vw, 80px);
  }
  .section-header.center{ margin-inline: auto; text-align: center; }

  .eyebrow{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 18px;
  }
  .eyebrow::before{
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ink);
    flex-shrink: 0;
  }

  h1, h2, h3 { font-weight: 600; letter-spacing: -0.02em; line-height: 1.08; }

  h2.section-title{
    font-size: clamp(30px, 3.6vw, 44px);
    margin-bottom: 16px;
  }
  .section-header p{
    color: var(--ink-soft);
    font-size: clamp(16px, 1.4vw, 18px);
    line-height: 1.6;
  }

  .btn{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px 32px;
    border-radius: var(--radius-full);
    font-size: 15.5px;
    font-weight: 600;
    letter-spacing: -0.01em;
    border: 1px solid transparent;
    transition: transform .35s var(--ease), background-color .35s var(--ease), border-color .35s var(--ease), box-shadow .35s var(--ease);
    white-space: nowrap;
  }
  .btn-primary{
    background: var(--ink);
    color: var(--white);
  }
  .btn-primary:hover{
    background: #2b2b2b;
    transform: translateY(-2px);
    box-shadow: 0 18px 30px -14px rgba(0,0,0,0.35);
  }
  .btn-primary:active{ transform: translateY(0); }

  .btn-outline{
    background: transparent;
    color: var(--ink);
    border-color: var(--border-strong);
  }
  .btn-outline:hover{
    border-color: var(--ink);
    transform: translateY(-2px);
  }

  /* ============================================================
     1. REVEAL ANIMATION
  ============================================================ */
  [data-reveal]{
    opacity: 0;
    transform: translateY(22px);
    transition: opacity .8s var(--ease), transform .8s var(--ease);
    transition-delay: var(--reveal-delay, 0s);
  }
  [data-reveal].is-visible{
    opacity: 1;
    transform: translateY(0);
  }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
    [data-reveal]{ opacity: 1; transform: none; }
  }

  /* ============================================================
     2. LOGO
  ============================================================ */
  .logo-icon{ width: 30px; height: 30px; flex-shrink: 0; }
  .brand{
    display: inline-flex;
    align-items: center;
    gap: 11px;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .brand span{ line-height: 1; }

  /* ============================================================
     3. NAVIGATION
  ============================================================ */
  .site-nav{
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.92);
    border-bottom: 1px solid transparent;
    z-index: 500;
    transition: border-color .4s var(--ease), box-shadow .4s var(--ease);
  }
  .site-nav.is-scrolled{
    border-bottom-color: var(--border);
  }
  .nav-inner{
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-links{
    display: flex;
    align-items: center;
    gap: clamp(20px, 2.4vw, 40px);
  }
  .nav-links a:not(.nav-github){
    font-size: 14.5px;
    font-weight: 500;
    color: var(--ink-soft);
    position: relative;
    padding-block: 6px;
    transition: color .3s var(--ease);
  }
  .nav-links a:not(.nav-github):hover,
  .nav-links a.is-active{
    color: var(--ink);
  }
  .nav-links a:not(.nav-github)::after{
    content: "";
    position: absolute;
    left: 0; bottom: 0;
    width: 100%;
    height: 1px;
    background: var(--ink);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .35s var(--ease);
  }
  .nav-links a:not(.nav-github):hover::after,
  .nav-links a.is-active::after{
    transform: scaleX(1);
  }

  .nav-github{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13.5px;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: var(--radius-full);
    border: 1px solid var(--border-strong);
    transition: border-color .3s var(--ease), background-color .3s var(--ease), transform .3s var(--ease);
  }
  .nav-github:hover{
    border-color: var(--ink);
    background: var(--ink);
    color: var(--white);
    transform: translateY(-1px);
  }
  .nav-github svg{ width: 16px; height: 16px; }

  .nav-toggle{
    display: none;
    width: 40px; height: 40px;
    align-items: center;
    justify-content: center;
  }
  .nav-toggle svg{ width: 22px; height: 22px; }

  /* Mobile nav */
  .mobile-panel{
    position: fixed;
    inset: var(--nav-h) 0 0 0;
    background: var(--white);
    z-index: 490;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px var(--pad-inline);
    transform: translateY(-12px);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity .35s var(--ease), transform .35s var(--ease), visibility 0s linear .35s;
  }
  .mobile-panel.is-open{
    opacity: 1;
    transform: translateY(0);
    visibility: visible;
    pointer-events: auto;
    transition: opacity .35s var(--ease), transform .35s var(--ease), visibility 0s linear 0s;
  }
  .mobile-panel a{
    display: block;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    padding-block: 16px;
    border-bottom: 1px solid var(--border);
  }
  .mobile-panel a.nav-github{
    display: inline-flex;
    margin-top: 24px;
    border-bottom: none;
    width: fit-content;
    font-size: 15px;
  }

  /* ============================================================
     4. HERO
  ============================================================ */
  .hero{
    padding-top: calc(var(--nav-h) + clamp(64px, 9vw, 120px));
    padding-bottom: clamp(80px, 10vw, 140px);
    text-align: center;
  }
  .hero-inner{
    max-width: 840px;
    margin-inline: auto;
  }
  .hero .eyebrow{ justify-content: center; }

  .hero h1{
    font-size: clamp(46px, 8vw, 92px);
    line-height: 1.02;
  }
  .hero h1 .line-2{
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
    font-weight: 400;
    color: var(--ink-soft);
  }
  .cursor{
    display: inline-block;
    width: 0.46em;
    height: 0.72em;
    background: var(--ink);
    animation: blink 1.1s step-end infinite;
    transform: translateY(0.06em);
  }
  @keyframes blink{
    0%, 45% { opacity: 1; }
    46%, 100% { opacity: 0; }
  }

  .hero-subtitle{
    margin-top: 30px;
    font-size: clamp(18px, 2vw, 22px);
    font-weight: 500;
    color: var(--ink);
  }
  .hero-subtitle span{ display: block; color: var(--ink-faint); font-weight: 400; }

  .hero-description{
    margin-top: 26px;
    font-size: clamp(16px, 1.4vw, 18px);
    color: var(--ink-soft);
    line-height: 1.7;
    max-width: 620px;
    margin-inline: auto;
  }

  .hero-actions{
    margin-top: 44px;
    display: flex;
    justify-content: center;
  }

  /* ============================================================
     5. ARCHITECTURE
  ============================================================ */
  .architecture{ background: var(--surface); }

  .arch-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .arch-card{
    background: var(--white);
    padding: 40px 32px;
    transition: background-color .35s var(--ease);
  }
  .arch-card:hover{ background: var(--surface); }
  .arch-index{
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 28px;
  }
  .arch-name{
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .arch-desc{
    font-size: 15px;
    color: var(--ink-soft);
  }

  /* ============================================================
     6. TECHNOLOGY / FEATURES
  ============================================================ */
  .tech-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .tech-card{
    background: var(--white);
    padding: 36px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: background-color .35s var(--ease), transform .35s var(--ease);
  }
  .tech-card:hover{ background: var(--surface); }
  .tech-icon{
    width: 26px; height: 26px;
    color: var(--ink);
  }
  .tech-icon svg{ width: 100%; height: 100%; }
  .tech-label{
    font-size: 15.5px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  /* ============================================================
     7. ROADMAP
  ============================================================ */
  .roadmap-track{
    position: relative;
    max-width: 760px;
  }
  .roadmap-track::before{
    content: "";
    position: absolute;
    left: 9px;
    top: 10px;
    bottom: 10px;
    width: 1px;
    background: var(--border-strong);
  }
  .roadmap-item{
    position: relative;
    padding-left: 48px;
    margin-bottom: 56px;
  }
  .roadmap-item:last-child{ margin-bottom: 0; }
  .roadmap-dot{
    position: absolute;
    left: 0; top: 6px;
    width: 19px; height: 19px;
    border-radius: 50%;
    background: var(--white);
    border: 1px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .roadmap-dot::after{
    content: "";
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ink);
  }
  .roadmap-phase{
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .roadmap-title{
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 18px;
  }
  .roadmap-list{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px 24px;
  }
  .roadmap-list li{
    font-size: 15.5px;
    color: var(--ink-soft);
    padding-left: 18px;
    position: relative;
  }
  .roadmap-list li::before{
    content: "";
    position: absolute;
    left: 0; top: 10px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ink-faint);
  }

  /* ============================================================
     8. ABOUT
  ============================================================ */
  .about-grid{
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: clamp(40px, 6vw, 100px);
    align-items: start;
  }
  .about-head{ position: sticky; top: calc(var(--nav-h) + 40px); }
  .about-head h2{ font-size: clamp(28px, 3vw, 36px); }
  .about-copy p{
    font-size: clamp(17px, 1.6vw, 20px);
    line-height: 1.75;
    color: var(--ink-soft);
    margin-bottom: 26px;
  }
  .about-copy p:first-child{
    color: var(--ink);
    font-weight: 500;
  }
  .about-copy p:last-child{ margin-bottom: 0; }
  .about-copy strong{ font-weight: 600; color: var(--ink); }

  /* ============================================================
     9. FOOTER
  ============================================================ */
  .site-footer{
    background: var(--black);
    color: #ffffff;
    padding-block: clamp(64px, 8vw, 100px) 32px;
  }
  .footer-top{
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 48px;
    padding-bottom: 64px;
    border-bottom: 1px solid var(--black-border);
  }
  .footer-brand .brand{ color: #ffffff; }
  .footer-brand p{
    margin-top: 18px;
    font-size: 14.5px;
    color: #8a8a8a;
    max-width: 260px;
    line-height: 1.6;
  }
  .footer-col h4{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7a7a7a;
    font-weight: 500;
    margin-bottom: 18px;
  }
  .footer-col a, .footer-col p{
    font-size: 15px;
    color: #e4e4e4;
  }
  .footer-col a{
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: color .3s var(--ease);
  }
  .footer-col a:hover{ color: #ffffff; }
  .footer-col svg{ width: 14px; height: 14px; opacity: 0.7; }

  .footer-bottom{
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding-top: 28px;
    font-size: 13.5px;
    color: #767676;
  }
  .footer-bottom .logo-icon{ width: 18px; height: 18px; }
  .footer-bottom-brand{
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  /* ============================================================
     10. RESPONSIVE
  ============================================================ */
  @media (max-width: 900px){
    .nav-links{ display: none; }
    .nav-toggle{ display: flex; }

    .about-grid{ grid-template-columns: 1fr; }
    .about-head{ position: static; }

    .footer-top{ grid-template-columns: 1fr 1fr; row-gap: 40px; }
    .footer-brand{ grid-column: 1 / -1; }
  }

  @media (max-width: 560px){
    section{ padding-block: clamp(64px, 14vw, 96px); }
    .hero{ padding-bottom: 72px; }
    .hero-actions{ width: 100%; }
    .btn-primary{ width: 100%; }
    .footer-top{ grid-template-columns: 1fr; }
    .roadmap-list{ grid-template-columns: 1fr; }
    .about-grid{ gap: 28px; }
  }
</style>
</head>
<body>

      <svg class="logo-icon" aria-hidden="true"><use href="#logo-mark"></use></svg>

        <svg view
